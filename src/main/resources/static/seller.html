<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>卖家中心 - 校园闲置交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px 30px; color: white; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav { display: flex; gap: 20px; }
        .nav a { color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; }
        .nav a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); text-align: center; }
        .stat-icon { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .stat-icon.blue { background: #e3f2fd; }
        .stat-icon.green { background: #e8f5e9; }
        .stat-icon.orange { background: #fff3e0; }
        .stat-icon.red { background: #ffebee; }
        .stat-value { font-size: 28px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .stat-label { color: #666; font-size: 14px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 12px 25px; background: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .goods-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); display: flex; gap: 20px; }
        .goods-image { width: 120px; height: 120px; background: #f8f9fa; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .goods-image img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .goods-info { flex: 1; }
        .goods-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .goods-desc { color: #666; font-size: 14px; margin-bottom: 10px; }
        .goods-meta { display: flex; gap: 20px; font-size: 14px; color: #999; }
        .goods-price { color: #e74c3c; font-size: 20px; font-weight: bold; }
        .goods-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #667eea; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
        .status-0 { background: #e8f5e9; color: #27ae60; }
        .status-1 { background: #ffebee; color: #e74c3c; }

        .order-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .order-no { font-size: 14px; color: #666; }
        .order-status { padding: 5px 12px; border-radius: 15px; font-size: 13px; }
        .order-status-0 { background: #fff3cd; color: #856404; }
        .order-status-1 { background: #d1ecf1; color: #0c5460; }
        .order-status-2 { background: #f8d7da; color: #721c24; }
        .order-status-3 { background: #d4edda; color: #155724; }
        .order-info { display: flex; justify-content: space-between; }
        .buyer-info { color: #666; }
        .order-price { font-size: 20px; font-weight: bold; color: #e74c3c; }

        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 15px; }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-text { color: #999; font-size: 16px; margin-bottom: 20px; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-size: 14px; z-index: 9999; }
        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🎓 校园闲置交易平台</div>
            <div class="nav">
                <a href="goods.html">首页</a>
                <a href="publish.html">发布商品</a>
                <a href="orders.html">我的订单</a>
                <a href="profile.html">个人中心</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h1 style="font-size:24px;font-weight:bold;margin-bottom:20px;">📦 卖家中心</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">📦</div>
                <div class="stat-value" id="totalGoods">0</div>
                <div class="stat-label">在售商品</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">💰</div>
                <div class="stat-value" id="totalOrders">0</div>
                <div class="stat-label">总订单数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">⏳</div>
                <div class="stat-value" id="pendingOrders">0</div>
                <div class="stat-label">待处理订单</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">💵</div>
                <div class="stat-value" id="totalSales">¥0</div>
                <div class="stat-label">总销售额</div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('goods')">我的商品</button>
            <button class="tab" onclick="switchTab('orders')">销售订单</button>
        </div>

        <div id="content"></div>
    </div>

    <script>
        let userId = localStorage.getItem('userId');

        function getCookie(name) {
            let arr = document.cookie.match(new RegExp('(^| )' + name + '=([^;]*)(;|$)'));
            return arr ? arr[2] : null;
        }

        function showToast(message, type = 'success') {
            let toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function getStatusText(status) {
            const texts = ['待支付', '已支付', '已取消', '已完成'];
            return texts[status] || '未知';
        }

        function getStatusClass(status) {
            return 'order-status-' + status;
        }

        async function loadStats() {
            try {
                let goodsRes = await fetch('/goods/user/' + userId);
                let goods = await goodsRes.json();
                let onSaleCount = goods ? goods.filter(g => g.status === 0).length : 0;
                document.getElementById('totalGoods').textContent = onSaleCount;

                let ordersRes = await fetch('/order/list?userId=' + userId);
                let orders = await orders.json() || [];
                document.getElementById('totalOrders').textContent = orders.length;
                
                let pendingCount = orders.filter(o => o.status === 1).length;
                document.getElementById('pendingOrders').textContent = pendingCount;

                let totalSales = orders.filter(o => o.status === 3).reduce((sum, o) => sum + parseFloat(o.price), 0);
                document.getElementById('totalSales').textContent = '¥' + totalSales.toFixed(2);
            } catch (err) {
                console.log('加载统计失败:', err);
            }
        }

        async function loadGoods() {
            try {
                let response = await fetch('/goods/user/' + userId);
                let goods = await response.json();
                let container = document.getElementById('content');

                if (!goods || goods.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📦</div>
                            <div class="empty-text">暂无商品</div>
                            <a href="publish.html" class="btn btn-primary" style="display:inline-block;padding:12px 30px;background:#667eea;color:white;text-decoration:none;border-radius:8px;">发布商品</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = goods.map(g => `
                    <div class="goods-card">
                        <div class="goods-image">
                            ${g.imageUrl ? `<img src="${g.imageUrl}" alt="${g.title}">` : '📷'}
                        </div>
                        <div class="goods-info">
                            <div class="goods-title">${g.title}</div>
                            <div class="goods-desc">${g.description || '暂无描述'}</div>
                            <div class="goods-meta">
                                <span>分类: ${g.categoryName || '未分类'}</span>
                                <span>浏览: ${g.viewCount || 0}</span>
                            </div>
                            <div class="goods-price">¥${g.price}</div>
                        </div>
                        <div class="goods-actions">
                            <span class="status-badge ${g.status === 0 ? 'status-0' : 'status-1'}">${g.status === 0 ? '在售' : '已售出'}</span>
                            ${g.status === 0 ? `<button class="btn btn-danger" onclick="deleteGoods(${g.id})">下架</button>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showToast('加载失败: ' + err.message, 'error');
            }
        }

        async function loadOrders() {
            try {
                let response = await fetch('/order/seller/' + userId);
                let orders = await response.json();
                let container = document.getElementById('content');

                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <div class="empty-text">暂无销售订单</div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = orders.map(order => `
                    <div class="order-card" onclick="window.location.href='order-detail.html?orderNo=${order.orderNo}'">
                        <div class="order-header">
                            <span class="order-no">订单号: ${order.orderNo}</span>
                            <span class="order-status ${getStatusClass(order.status)}">${getStatusText(order.status)}</span>
                        </div>
                        <div class="order-info">
                            <div class="buyer-info">
                                <div>买家ID: ${order.buyerId}</div>
                                <div style="margin-top:5px;color:#999;">${order.createTime || ''}</div>
                            </div>
                            <div class="order-price">¥${order.price}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showToast('加载失败: ' + err.message, 'error');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'goods') {
                loadGoods();
            } else {
                loadOrders();
            }
        }

        async function deleteGoods(goodsId) {
            if (!confirm('确定要下架这件商品吗？')) return;
            
            try {
                let response = await fetch('/goods/delete?id=' + goodsId, { method: 'POST' });
                let result = await response.text();
                if (result === 'success') {
                    showToast('商品已下架');
                    loadGoods();
                    loadStats();
                } else {
                    showToast(result, 'error');
                }
            } catch (err) {
                showToast('操作失败: ' + err.message, 'error');
            }
        }

        if (!userId) {
            window.location.href = 'login.html';
        } else {
            loadStats();
            loadGoods();
        }
    </script>
</body>
</html>
