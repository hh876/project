<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>消息中心 - 校园闲置交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px 30px; color: white; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav { display: flex; gap: 20px; }
        .nav a { color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; }
        .nav a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; }
        .page-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #333; }
        
        .message-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
        .message-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .message-type { display: flex; align-items: center; gap: 10px; }
        .type-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .type-icon.system { background: #fff3cd; }
        .type-icon.private { background: #d1ecf1; }
        .type-name { font-weight: bold; }
        .message-time { font-size: 13px; color: #999; }
        .message-content { color: #666; line-height: 1.6; }
        .unread-dot { width: 8px; height: 8px; background: #e74c3c; border-radius: 50%; }
        
        .mark-read-btn { padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .mark-read-btn:hover { background: #5568d3; }
        
        .empty-state { text-align: center; padding: 60px 20px; background: white; border-radius: 15px; }
        .empty-icon { font-size: 64px; margin-bottom: 20px; }
        .empty-text { color: #999; font-size: 16px; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-size: 14px; z-index: 9999; }
        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🎓 校园闲置交易平台</div>
            <div class="nav">
                <a href="goods.html">首页</a>
                <a href="publish.html">发布商品</a>
                <a href="orders.html">我的订单</a>
                <a href="profile.html">个人中心</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h1 class="page-title" style="margin-bottom:0;">📬 消息中心</h1>
            <button class="mark-read-btn" onclick="markAllRead()">全部标为已读</button>
        </div>
        <div id="messageList"></div>
    </div>

    <script>
        let userId = localStorage.getItem('userId');

        function getCookie(name) {
            let arr = document.cookie.match(new RegExp('(^| )' + name + '=([^;]*)(;|$)'));
            return arr ? arr[2] : null;
        }

        function showToast(message, type = 'success') {
            let toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        async function loadMessages() {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }

            try {
                let response = await fetch('/message/list?receiverId=' + userId);
                let messages = await response.json();

                let container = document.getElementById('messageList');

                if (!messages || messages.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">暂无消息</div>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = messages.map(msg => `
                    <div class="message-card" onclick="readMessage(${msg.id})">
                        <div class="message-header">
                            <div class="message-type">
                                <div class="type-icon ${msg.type === 2 ? 'system' : 'private'}">
                                    ${msg.type === 2 ? '🔔' : '💬'}
                                </div>
                                <div>
                                    <div class="type-name">${msg.type === 2 ? '系统通知' : (msg.senderNickname || '未知用户')}</div>
                                    ${msg.readStatus === 0 ? '<div class="unread-dot"></div>' : ''}
                                </div>
                            </div>
                            <div class="message-time">${formatTime(msg.createTime)}</div>
                        </div>
                        <div class="message-content">${msg.content}</div>
                    </div>
                `).join('');
            } catch (err) {
                showToast('加载失败: ' + err.message, 'error');
            }
        }

        function formatTime(timeStr) {
            if (!timeStr) return '';
            let date = new Date(timeStr);
            let now = new Date();
            let diff = now - date;
            
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
            if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
            return date.toLocaleDateString();
        }

        async function readMessage(messageId) {
            try {
                await fetch('/message/read/' + messageId, { method: 'POST' });
                loadMessages();
            } catch (err) {
                console.log('标记已读失败:', err);
            }
        }

        async function markAllRead() {
            try {
                await fetch('/message/read/all/' + userId, { method: 'POST' });
                showToast('已全部标为已读');
                loadMessages();
            } catch (err) {
                showToast('操作失败: ' + err.message, 'error');
            }
        }

        loadMessages();
    </script>
</body>
</html>
