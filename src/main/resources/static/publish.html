<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>校园闲置交易平台 - 发布商品</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            max-width: 600px;
            margin: 40px auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .header h1 {
            font-size: 24px;
            color: #333;
            font-weight: 600;
        }

        .header .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .header .back-link:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 500;
            font-size: 15px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            background: #fafafa;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        .form-group .input-group {
            position: relative;
        }

        .form-group .input-group input {
            padding-left: 45px;
        }

        .form-group .input-group .prefix {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-weight: 500;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #eee;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 24px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(120%);
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background: #27ae60;
        }

        .toast.error {
            background: #e74c3c;
        }

        .form-tips {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        .price-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .price-info span {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 发布闲置商品</h1>
            <a href="goods.html" class="back-link">
                <span>←</span>
                <span>返回列表</span>
            </a>
        </div>

        <div class="form-group">
            <label>商品标题</label>
            <input type="text" id="title" placeholder="请输入商品标题，如：闲置笔记本电脑">
            <div class="form-tips">简洁明了地描述你的商品</div>
        </div>

        <div class="form-group">
            <label>商品描述</label>
            <textarea id="desc" placeholder="详细描述商品的成色、使用情况、配件等信息..."></textarea>
            <div class="form-tips">描述越详细，越容易吸引买家</div>
        </div>

        <div class="form-group">
            <label>商品价格</label>
            <div class="input-group">
                <span class="prefix">¥</span>
                <input type="number" id="price" placeholder="0.00" step="0.01">
            </div>
            <div class="form-tips">请输入合理的价格，支持小数</div>
        </div>

        <div class="form-group">
            <label>商品分类</label>
            <select id="category" style="width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; background: #fafafa; outline: none;">
                <option value="0">请选择分类</option>
            </select>
            <div class="form-tips">选择商品所属分类</div>
        </div>

        <div class="form-group">
            <label>商品图片（可选）</label>
            <div id="upload-area" style="border: 2px dashed #ddd; border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s ease;">
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                <div id="upload-icon" style="font-size: 48px; margin-bottom: 15px;">📷</div>
                <div id="upload-text" style="color: #666; font-size: 15px;">点击或拖拽上传图片</div>
                <div style="color: #999; font-size: 13px; margin-top: 8px;">支持 JPG、PNG、GIF 格式</div>
            </div>
            <div id="preview-container" style="display: none; margin-top: 15px;">
                <img id="preview-image" style="max-width: 200px; max-height: 200px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <button onclick="removeImage()" style="margin-left: 15px; padding: 8px 16px; background: #f5f5f5; border: none; border-radius: 8px; color: #666; cursor: pointer;">移除图片</button>
            </div>
            <input type="hidden" id="imageUrl">
            <div class="form-tips">上传本地图片，让商品更吸引人</div>
        </div>

        <button class="btn btn-primary" onclick="publish()">发布商品</button>
        <button class="btn btn-secondary" onclick="resetForm()">重置表单</button>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const userId = localStorage.getItem("userId");
        const userRole = localStorage.getItem("role");

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => {
                toast.className = 'toast';
            }, 3000);
        }

        function resetForm() {
            document.getElementById('title').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('price').value = '';
            document.getElementById('category').value = '0';
            document.getElementById('imageUrl').value = '';
            document.getElementById('preview-container').style.display = 'none';
            document.getElementById('upload-area').style.borderColor = '#ddd';
            document.getElementById('upload-text').textContent = '点击或拖拽上传图片';
            document.getElementById('upload-icon').textContent = '📷';
        }

        function initUpload() {
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    uploadFile(file);
                }
            });

            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#667eea';
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.style.borderColor = '#ddd';
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.style.borderColor = '#ddd';
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    uploadFile(file);
                } else {
                    showToast('请上传图片文件', 'error');
                }
            });
        }

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('imageUrl').value = data.url;
                    document.getElementById('preview-image').src = data.url;
                    document.getElementById('preview-container').style.display = 'block';
                    document.getElementById('upload-area').style.borderColor = '#27ae60';
                    document.getElementById('upload-text').textContent = '上传成功！';
                    document.getElementById('upload-icon').textContent = '✅';
                } else {
                    showToast('上传失败：' + data.message, 'error');
                }
            })
            .catch(err => {
                showToast('上传失败：' + err.message, 'error');
            });
        }

        function removeImage() {
            document.getElementById('imageUrl').value = '';
            document.getElementById('preview-container').style.display = 'none';
            document.getElementById('upload-area').style.borderColor = '#ddd';
            document.getElementById('upload-text').textContent = '点击或拖拽上传图片';
            document.getElementById('upload-icon').textContent = '📷';
        }

        function loadCategories() {
            fetch("/goods/categories")
            .then(res => res.json())
            .then(categories => {
                const select = document.getElementById('category');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            })
            .catch(err => {
                console.log('加载分类失败：', err);
            });
        }

        function publish() {
            if (!userId) {
                showToast('请先登录！', 'error');
                setTimeout(() => {
                    location.href = 'login.html';
                }, 1000);
                return;
            }

            // 权限检查：只有卖家角色可以发布商品
            if (userRole !== 'both' && userRole !== 'seller') {
                showToast('只有卖家角色才能发布商品！', 'error');
                return;
            }

            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('desc').value.trim();
            const price = document.getElementById('price').value.trim();
            const categoryId = document.getElementById('category').value;
            const imageUrl = document.getElementById('imageUrl').value.trim();

            if (!title) {
                showToast('请输入商品标题', 'error');
                return;
            }
            if (!description) {
                showToast('请输入商品描述', 'error');
                return;
            }
            if (!price || parseFloat(price) <= 0) {
                showToast('请输入有效的价格', 'error');
                return;
            }
            if (categoryId == 0) {
                showToast('请选择商品分类', 'error');
                return;
            }

            fetch("/goods/publish", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: parseInt(userId),
                    title: title,
                    description: description,
                    price: parseFloat(price),
                    categoryId: parseInt(categoryId),
                    imageUrl: imageUrl
                })
            })
            .then(res => res.text())
            .then(txt => {
                if (txt.includes("成功")) {
                    showToast('发布成功！', 'success');
                    setTimeout(() => {
                        location.href = 'goods.html';
                    }, 1500);
                } else {
                    showToast('发布失败：' + txt, 'error');
                }
            })
            .catch(err => {
                showToast('发布失败：' + err.message, 'error');
            });
        }

        window.onload = function() {
            loadCategories();
            initUpload();
        }
    </script>
</body>
</html>
