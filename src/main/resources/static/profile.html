<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心 - 校园闲置交易平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 15px 30px; color: white; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-size: 20px; font-weight: bold; }
        .nav { display: flex; gap: 20px; }
        .nav a { color: white; text-decoration: none; padding: 5px 10px; border-radius: 5px; }
        .nav a:hover { background: rgba(255,255,255,0.2); }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        .profile-card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 20px; }
        .profile-header { display: flex; gap: 30px; margin-bottom: 30px; }
        .avatar-section { text-align: center; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 48px; margin-bottom: 15px; }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .user-info h2 { font-size: 24px; margin-bottom: 10px; }
        .user-info p { color: #666; margin-bottom: 5px; }
        .role-badge { display: inline-block; padding: 3px 10px; background: #667eea; color: white; border-radius: 12px; font-size: 12px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 14px; }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { display: flex; align-items: center; gap: 15px; padding: 20px; background: #f8f9fa; border-radius: 10px; cursor: pointer; transition: all 0.3s; }
        .menu-item:hover { background: #f0f4ff; transform: translateX(5px); }
        .menu-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .menu-text h3 { font-size: 16px; margin-bottom: 5px; }
        .menu-text p { font-size: 12px; color: #999; }

        .edit-form { display: none; }
        .edit-form.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        .form-group input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-size: 14px; z-index: 9999; }
        .toast-success { background: #27ae60; }
        .toast-error { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="logo">🎓 校园闲置交易平台</div>
            <div class="nav">
                <a href="goods.html">首页</a>
                <a href="publish.html">发布商品</a>
                <a href="orders.html">我的订单</a>
                <a href="profile.html">个人中心</a>
                <a href="login.html" id="logoutBtn">退出登录</a>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar-section">
                    <div class="avatar" id="userAvatar">👤</div>
                    <button class="btn btn-secondary" onclick="document.getElementById('avatarInput').click()">更换头像</button>
                    <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
                </div>
                <div class="user-info">
                    <h2 id="nickname">加载中...</h2>
                    <p>用户名: <span id="username"></span></p>
                    <p>手机号: <span id="phone"></span></p>
                    <span class="role-badge" id="role">-</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="goodsCount">0</div>
                    <div class="stat-label">发布商品</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="orderCount">0</div>
                    <div class="stat-label">我的订单</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="favoriteCount">0</div>
                    <div class="stat-label">我的收藏</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="reviewCount">0</div>
                    <div class="stat-label">我的评价</div>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="showEditForm('info')">
                    <div class="menu-icon">✏️</div>
                    <div class="menu-text">
                        <h3>编辑资料</h3>
                        <p>修改昵称、手机号等信息</p>
                    </div>
                </div>
                <div class="menu-item" onclick="showEditForm('password')">
                    <div class="menu-icon">🔒</div>
                    <div class="menu-text">
                        <h3>修改密码</h3>
                        <p>更改您的登录密码</p>
                    </div>
                </div>
                <div class="menu-item" onclick="window.location.href='favorites.html'">
                    <div class="menu-icon">❤️</div>
                    <div class="menu-text">
                        <h3>我的收藏</h3>
                        <p>查看您收藏的商品</p>
                    </div>
                </div>
                <div class="menu-item" onclick="window.location.href='messages.html'">
                    <div class="menu-icon">💬</div>
                    <div class="menu-text">
                        <h3>消息中心</h3>
                        <p>查看系统通知和私信</p>
                    </div>
                </div>
                <div class="menu-item" onclick="window.location.href='seller.html'">
                    <div class="menu-icon">📦</div>
                    <div class="menu-text">
                        <h3>卖家中心</h3>
                        <p>管理我的商品和订单</p>
                    </div>
                </div>
                <div class="menu-item" onclick="window.location.href='goods.html'">
                    <div class="menu-icon">🛒</div>
                    <div class="menu-text">
                        <h3>继续购物</h3>
                        <p>浏览更多商品</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-card edit-form" id="infoForm">
            <h3 style="margin-bottom:20px;">编辑资料</h3>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" id="editNickname" placeholder="请输入昵称">
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" id="editPhone" placeholder="请输入手机号">
            </div>
            <div style="display:flex;gap:15px;">
                <button class="btn btn-primary" onclick="saveProfile()">保存</button>
                <button class="btn btn-secondary" onclick="hideEditForms()">取消</button>
            </div>
        </div>

        <div class="profile-card edit-form" id="passwordForm">
            <h3 style="margin-bottom:20px;">修改密码</h3>
            <div class="form-group">
                <label>原密码</label>
                <input type="password" id="oldPassword" placeholder="请输入原密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPassword" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
            </div>
            <div style="display:flex;gap:15px;">
                <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
                <button class="btn btn-secondary" onclick="hideEditForms()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let userId = localStorage.getItem('userId');

        function getCookie(name) {
            let arr = document.cookie.match(new RegExp('(^| )' + name + '=([^;]*)(;|$)'));
            return arr ? arr[2] : null;
        }

        function showToast(message, type = 'success') {
            let toast = document.createElement('div');
            toast.className = 'toast toast-' + type;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function getRoleName(role) {
            const roles = { 'both': '买卖皆可', 'seller': '卖家', 'buyer': '买家' };
            return roles[role] || '-';
        }

        async function loadProfile() {
            if (!userId) {
                window.location.href = 'login.html';
                return;
            }
            
            try {
                let response = await fetch('/user/get?id=' + userId);
                let user = await response.json();
                
                document.getElementById('nickname').textContent = user.nickname || user.username;
                document.getElementById('username').textContent = user.username;
                document.getElementById('phone').textContent = user.phone || '未设置';
                document.getElementById('role').textContent = getRoleName(user.role);
                document.getElementById('editNickname').value = user.nickname || '';
                document.getElementById('editPhone').value = user.phone || '';
                
                // 加载统计数据
                let goodsResponse = await fetch('/goods/user/' + userId);
                let goods = await goodsResponse.json();
                document.getElementById('goodsCount').textContent = goods ? goods.length : 0;
                
                let orderResponse = await fetch('/order/list?userId=' + userId);
                let orders = await orderResponse.json();
                document.getElementById('orderCount').textContent = orders ? orders.length : 0;
                
                let favResponse = await fetch('/favorite/list?userId=' + userId);
                let favorites = await favResponse.json();
                document.getElementById('favoriteCount').textContent = favorites ? favorites.length : 0;
                
                let reviewResponse = await fetch('/review/buyer/' + userId);
                let reviews = await reviewResponse.json();
                document.getElementById('reviewCount').textContent = reviews ? reviews.length : 0;
            } catch (err) {
                showToast('加载失败: ' + err.message, 'error');
            }
        }

        function showEditForm(formName) {
            hideEditForms();
            document.getElementById(formName + 'Form').classList.add('active');
        }

        function hideEditForms() {
            document.querySelectorAll('.edit-form').forEach(f => f.classList.remove('active'));
        }

        async function saveProfile() {
            let nickname = document.getElementById('editNickname').value;
            let phone = document.getElementById('editPhone').value;
            
            try {
                let response = await fetch('/user/update?id=' + userId + '&nickname=' + encodeURIComponent(nickname) + '&phone=' + encodeURIComponent(phone), {
                    method: 'POST'
                });
                let result = await response.text();
                if (result === 'success') {
                    showToast('保存成功');
                    localStorage.setItem('username', nickname);
                    loadProfile();
                    hideEditForms();
                } else {
                    showToast(result, 'error');
                }
            } catch (err) {
                showToast('保存失败: ' + err.message, 'error');
            }
        }

        async function changePassword() {
            let oldPwd = document.getElementById('oldPassword').value;
            let newPwd = document.getElementById('newPassword').value;
            let confirmPwd = document.getElementById('confirmPassword').value;
            
            if (newPwd !== confirmPwd) {
                showToast('两次密码输入不一致', 'error');
                return;
            }
            
            if (newPwd.length < 6) {
                showToast('密码长度不能少于6位', 'error');
                return;
            }
            
            try {
                let response = await fetch('/user/changePassword?id=' + userId + '&oldPassword=' + oldPwd + '&newPassword=' + newPwd, {
                    method: 'POST'
                });
                let result = await response.text();
                if (result === 'success') {
                    showToast('密码修改成功');
                    document.getElementById('oldPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    hideEditForms();
                } else {
                    showToast(result, 'error');
                }
            } catch (err) {
                showToast('修改失败: ' + err.message, 'error');
            }
        }

        async function uploadAvatar(event) {
            let file = event.target.files[0];
            if (!file) return;
            
            let formData = new FormData();
            formData.append('file', file);
            
            try {
                let response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                let result = await response.text();
                if (result.startsWith('/uploads/')) {
                    await fetch('/user/update?id=' + userId + '&avatar=' + encodeURIComponent(result), {
                        method: 'POST'
                    });
                    showToast('头像上传成功');
                    loadProfile();
                } else {
                    showToast(result, 'error');
                }
            } catch (err) {
                showToast('上传失败: ' + err.message, 'error');
            }
        }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('userId');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = 'login.html';
        };

        loadProfile();
    </script>
</body>
</html>
